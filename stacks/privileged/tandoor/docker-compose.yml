services:
  db_recipes:
    restart: always
    image: postgres:16-alpine
    volumes:
      - /opt/docker/privileged/tandoor/postgresql:/var/lib/postgresql/data
    env_file:
      - .env

  web_recipes:
    restart: always
    image: vabene1111/recipes
    ports:
      - 7010:80
    env_file:
      - .env
    volumes:
      - /opt/docker/privileged/tandoor/staticfiles:/opt/recipes/staticfiles
      - /opt/docker/privileged/tandoor/mediafiles:/opt/recipes/mediafiles
    depends_on:
      - db_recipes

volumes:
  staticfiles:
