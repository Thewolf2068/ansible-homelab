services:
  homepage:
    image: ghcr.io/gethomepage/homepage:${HOMEPAGE_VERSION}
    container_name: homepage
    env_file: .env
    restart: unless-stopped
    ports:
      - 9999:3000
    volumes:
      - /opt/docker/standard/homepage/config:/app/config # Make sure your local config directory exists
      - /opt/docker/standard/homepage/images:/app/public/images
      - /var/run/docker.sock:/var/run/docker.sock:ro # (optional) For docker integrations, see alternative methods
