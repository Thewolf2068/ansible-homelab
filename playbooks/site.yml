- name: Server Setup
  hosts: myhosts
  become: true
  vars_files:
    - ../group_vars/all/vault.yml
    - ../group_vars/all/versions.yaml
    - ../group_vars/all/server_vars.yml
    - ../group_vars/all/restic.yml
  vars:
    project_root: "{{ playbook_dir }}/.."
  roles:
    - docker_stacks
    - caddy
    - fail2ban
    - restic
